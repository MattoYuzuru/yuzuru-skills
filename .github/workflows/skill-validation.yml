name: Skill validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skills
        run: ./skill validate all
      - name: Test GitHub workflow helper
        env:
          PYTHONPATH: skills/github-workflow/scripts
        run: python3 -m unittest discover -s skills/github-workflow/scripts/tests -v
