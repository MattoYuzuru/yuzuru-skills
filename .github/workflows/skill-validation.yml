name: Skill validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skills
        run: ./skill validate all --strict
      - name: Compile Python helpers
        run: python3 -m compileall -q scripts skills
      - name: Check shell helpers
        run: shellcheck skill install.sh skills/google-ai-search/scripts/*.sh
      - name: Check credential-free help
        run: python3 scripts/smoke_scripts.py
      - name: Run helper unit tests
        run: python3 scripts/run_tests.py
